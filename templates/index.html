<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Book Recommender System</title>
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css"
        integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    body {
        font-family: 'Inter', sans-serif;
    }

    .text-white {
        color: white;
    }

    .custom-card {
        background: #1e1e2d;
        border-radius: 16px;
        overflow: hidden;
        transition: all 0.3s ease;
        height: 100%;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .custom-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .custom-card img {
        width: 100%;
        height: 280px;
        object-fit: cover;
        border-bottom: 2px solid #303046;
    }

    .custom-card-body {
        padding: 20px;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .book-title {
        font-size: 17px;
        font-weight: 700;
        margin-bottom: 6px;
        line-height: 1.4;
        color: #f8f8f2;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .book-author {
        font-size: 14px;
        color: #a1a1aa;
        margin-bottom: 12px;
        font-style: italic;
    }

    .stats-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: auto;
        padding-top: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .rating-badge {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        color: white;
        padding: 4px 10px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 13px;
        box-shadow: 0 2px 4px rgba(245, 158, 11, 0.3);
    }

    .votes-text {
        font-size: 13px;
        color: #8b8b99;
        font-weight: 600;
    }
</style>

<body style="background-color:#121212">

    <nav
        style="background: linear-gradient(135deg, #1f1f2e 0%, #303046 100%); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
        <a href="/"
            style="color: #ffffff; font-size: 28px; font-weight: 800; text-decoration: none; letter-spacing: 1.5px;">📚
            BookRecs</a>
        <ul style="list-style: none; display: flex; gap: 40px; margin: 0; padding: 0;">
            <li><a href="/"
                    style="color: #d1d1e0; text-decoration: none; font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease;"
                    onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#d1d1e0'">Home</a></li>
            <li><a href="/recommend"
                    style="color: #d1d1e0; text-decoration: none; font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease;"
                    onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#d1d1e0'">Recommend</a></li>
            <li><a href="#"
                    style="color: #d1d1e0; text-decoration: none; font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease;"
                    onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#d1d1e0'">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text-white" style="font-size:50px">Top 50 Books</h1>
            </div>

            {% for i in range(book_name|length) %}
            <div class="col-md-3" style="margin-top:40px; margin-bottom: 20px;">
                <div class="custom-card">
                    <img src="{{ image[i] }}" alt="Book Cover">
                    <div class="custom-card-body">
                        <div class="book-title" title="{{ book_name[i] }}">{{ book_name[i] }}</div>
                        <div class="book-author">{{ author[i] }}</div>
                        <div class="stats-row">
                            <span class="votes-text">{{ votes[i] }} Votes</span>
                            <span class="rating-badge">⭐ {{ rating[i]|round(1) }}</span>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}


        </div>
    </div>

</body>

</html>
